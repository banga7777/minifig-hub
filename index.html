    <style>
      :root {
        --safe-area-inset-top: env(safe-area-inset-top, 0px);
        --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
      }

      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: #4f46e5;
      }

      body { 
        font-family: 'Outfit', sans-serif;
        user-select: none;
        -webkit-user-select: none;
        margin: 0;
        padding: 0;
        overscroll-behavior: none;
        -webkit-font-smoothing: antialiased;
      }
      
      #root {
        height: 100%;
        width: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        /* Remove top padding to allow header to cover the status bar area correctly */
        padding-top: 0;
      }

      main {
        /* Padding is now controlled dynamically in App.tsx */
      }

      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      #splash-screen {
        position: fixed;
        inset: 0;
        background: #4f46e5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .splash-logo {
        width: 90px;
        height: 90px;
        background: linear-gradient(135deg, #6366f1, #4338ca);
        border-radius: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 20px 60px rgba(67, 56, 202, 0.5);
        margin-bottom: 24px;
        animation: bounce-pulse 2.5s infinite ease-in-out;
      }

      @keyframes bounce-pulse {
        0%, 100% { transform: translateY(0) scale(1); filter: brightness(1); }
        50% { transform: translateY(-10px) scale(1.05); filter: brightness(1.2); }
      }

      .loading-bar {
        width: 140px;
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        overflow: hidden;
        margin-top: 20px;
      }

      .loading-progress {
        width: 40%;
        height: 100%;
        background: #a5b4fc;
        border-radius: 10px;
        animation: loading-slide 1.5s infinite ease-in-out;
      }

      @keyframes loading-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(250%); }
      }

      input {
        font-size: 16px !important;
      }

      /* Toast styles */
      .toast-container {
        position: fixed;
        bottom: calc(80px + var(--safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        z-index: 2000;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 300px; /* Adjust as needed */
      }

      .toast-message {
        background-color: rgba(30, 41, 59, 0.95); /* brand-card equivalent with opacity */
        color: white;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: bold;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        opacity: 0;
        transform: translateY(20px);
        animation: toast-in 0.3s ease-out forwards, toast-out 0.3s ease-in forwards 2s;
        border: 1px solid rgba(255, 255, 255, 0.1);
        white-space: nowrap;
      }

      @keyframes toast-in {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes toast-out {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(20px); }
      }
    </style>
